<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Document Vault — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a0f0a;
    --burgundy: #6b1f1f;
    --burgundy-light: #8b2e2e;
    --gold: #c49a3c;
    --gold-light: #e8c97e;
    --cream: #f8f3eb;
    --cream-dark: #ede5d4;
    --muted: #8a7060;
    --border: #d4c4a8;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-texture {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 80% at 20% 10%, rgba(107,31,31,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 90%, rgba(196,154,60,0.07) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }

  .card {
    position: relative; z-index: 1;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 52px 48px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 1px 3px rgba(26,15,10,0.06),
      0 8px 40px rgba(26,15,10,0.10),
      0 0 0 1px rgba(196,154,60,0.08);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .vault-icon {
    width: 52px; height: 52px;
    background: var(--burgundy);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 4px 16px rgba(107,31,31,0.25);
  }

  .vault-icon svg { width: 24px; height: 24px; fill: var(--gold-light); }

  .header { text-align: center; margin-bottom: 36px; }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 26px;
    color: var(--ink);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 12px auto 0;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 1px;
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--burgundy);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(107,31,31,0.07);
  }

  input::placeholder { color: #c4b49e; }

  .btn {
    width: 100%;
    padding: 13px;
    background: var(--burgundy);
    color: var(--gold-light);
    border: none;
    border-radius: 1px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn:hover { background: var(--burgundy-light); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--burgundy);
    border: 1px solid var(--border);
    font-size: 12px;
    margin-top: 10px;
  }
  .btn-secondary:hover { background: var(--cream); border-color: var(--burgundy); }

  .step { display: none; }
  .step.active { display: block; animation: fadeUp 0.4s ease both; }

  .msg {
    padding: 10px 14px;
    border-radius: 1px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .msg.error { background: #fdf0f0; color: #8b1f1f; border: 1px solid #f0c4c4; display: block; }
  .msg.success { background: #f0fdf4; color: #1a5c2e; border: 1px solid #c4ecd0; display: block; }

  .otp-hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 14px;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(232,201,126,0.3);
    border-top-color: var(--gold-light);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-texture"></div>

<div class="card">
  <div class="vault-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
    </svg>
  </div>

  <div class="header">
    <h1>Family Document Vault</h1>
    <p class="subtitle">Secure access for family members</p>
    <div class="divider"></div>
  </div>

  <div id="msgBox" class="msg"></div>

  <!-- Step 1: Email -->
  <div id="step1" class="step active">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
    </div>
    <button class="btn" id="sendOtpBtn" onclick="sendOTP()">Send One-Time Code</button>
  </div>

  <!-- Step 2: OTP -->
  <div id="step2" class="step">
    <div class="field">
      <label>6-Digit Code</label>
      <input type="text" id="otpInput" placeholder="• • • • • •" maxlength="6"
             inputmode="numeric" autocomplete="one-time-code"
             style="letter-spacing: 0.3em; font-size: 20px; text-align: center;">
    </div>
    <button class="btn" id="verifyBtn" onclick="verifyOTP()">Verify & Enter Vault</button>
    <button class="btn btn-secondary" onclick="goBack()">← Use different email</button>
    <p class="otp-hint">Code expires in 5 minutes. Check your inbox (and spam).</p>
  </div>

  <!-- Step 3: Username (first login) -->
  <div id="step3" class="step">
    <div class="field">
      <label>Choose Your Name</label>
      <input type="text" id="usernameInput" placeholder="e.g. Priya, Dad, Grandma..."
             maxlength="40" autocomplete="nickname">
    </div>
    <button class="btn" onclick="setUsername()">Join the Vault</button>
  </div>
</div>

<script>
let currentEmail = '';

function showMsg(text, type='error') {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg ' + type;
}
function clearMsg() {
  const box = document.getElementById('msgBox');
  box.className = 'msg';
}
function showStep(n) {
  ['step1','step2','step3'].forEach((id,i) => {
    document.getElementById(id).classList.toggle('active', i === n-1);
  });
  clearMsg();
}

async function sendOTP() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) return showMsg('Please enter your email address.');
  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';
  try {
    const r = await fetch('/api/auth/request-otp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed to send OTP');
    currentEmail = email;
    showStep(2);
    showMsg('Code sent to ' + email, 'success');
    document.getElementById('otpInput').focus();
  } catch(e) {
    showMsg(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Send One-Time Code';
  }
}

async function verifyOTP() {
  const otp = document.getElementById('otpInput').value.trim();
  if (otp.length !== 6) return showMsg('Enter the full 6-digit code.');
  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verifying…';
  try {
    const r = await fetch('/api/auth/verify-otp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: currentEmail, otp})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Verification failed');
    if (d.needs_username) {
      showStep(3);
      showMsg('Welcome! Please choose a display name.', 'success');
      document.getElementById('usernameInput').focus();
    } else {
      showMsg('Access granted. Entering vault…', 'success');
      setTimeout(() => window.location.href = '/dashboard', 900);
    }
  } catch(e) {
    showMsg(e.message);
    btn.disabled = false;
    btn.innerHTML = 'Verify & Enter Vault';
  }
}

async function setUsername() {
  const username = document.getElementById('usernameInput').value.trim();
  if (!username) return showMsg('Please enter a name.');
  try {
    const r = await fetch('/api/auth/set-username', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: currentEmail, username})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed to set username');
    showMsg('Welcome, ' + username + '! Entering vault…', 'success');
    setTimeout(() => window.location.href = '/dashboard', 900);
  } catch(e) {
    showMsg(e.message);
  }
}

function goBack() { showStep(1); }

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('step1').classList.contains('active')) sendOTP();
  else if (document.getElementById('step2').classList.contains('active')) verifyOTP();
  else if (document.getElementById('step3').classList.contains('active')) setUsername();
});
</script>
</body>
</html>
